---
# Deploy automático do cPanel (Git Version Control).
#
# Ao clicar em "Deploy HEAD Commit" no cPanel (aba Pull or Deploy), o cPanel
# faz o pull do repositório e executa as tarefas abaixo NO SERVIDOR — é assim
# que os comandos PHP (composer/migrate/cache) rodam sem CLI manual.
#
# Cada tarefa detecta o PHP automaticamente (usa `php` do PATH; se não achar,
# cai para /usr/local/bin/php). Se sua hospedagem usar uma versão específica,
# troque por algo como /usr/local/bin/ea-php83.
deployment:
  tasks:
    - 'PHP=$(command -v php || echo /usr/local/bin/php); $PHP composer.phar install --no-dev --optimize-autoloader --no-interaction 2>&1 || true'
    - 'PHP=$(command -v php || echo /usr/local/bin/php); $PHP artisan migrate --force 2>&1'
    - 'PHP=$(command -v php || echo /usr/local/bin/php); $PHP artisan optimize:clear 2>&1'
    - 'PHP=$(command -v php || echo /usr/local/bin/php); $PHP artisan storage:link 2>&1 || true'
